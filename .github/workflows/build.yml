name: Build & Test APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 수동 실행도 가능

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Gradle 캐시
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # 4. 실행 권한
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5. 단위 테스트 실행 ← 여기서 테스트 통과해야 APK 빌드
      - name: Run Unit Tests
        run: ./gradlew test --stacktrace

      # 6. 테스트 리포트 업로드 (실패해도 확인 가능)
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: app/build/reports/tests/

      # 7. APK 빌드 (테스트 통과 시만)
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # 8. APK 파일 업로드 (다운로드 가능)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NFCCard-release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30   # 30일간 보관

      # 9. 빌드 결과 요약
      - name: Build Summary
        if: success()
        run: |
          echo "## ✅ 빌드 성공" >> $GITHUB_STEP_SUMMARY
          echo "APK 파일은 Actions 탭 → 이 워크플로우 → Artifacts 에서 다운로드 가능합니다." >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/release/*.apk >> $GITHUB_STEP_SUMMARY
